
<style>
*{box-sizing:border-box;margin:0;padding:0}
#gc{position:relative;width:100%;height:100svh;min-height:520px;overflow:hidden;background:#111;font-family:sans-serif}
#video{width:100%;height:100%;object-fit:cover;display:block}
#threeCanvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#hitLayer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:all}
#hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:linear-gradient(to bottom,rgba(0,0,0,.55),transparent);pointer-events:none}
.hval{color:#fff;font-size:15px;font-weight:600;background:rgba(0,0,0,.4);border-radius:20px;padding:6px 14px;border:1.5px solid rgba(255,255,255,.2)}
#timerH{background:rgba(200,40,40,.75)}
#toast{position:absolute;top:68px;left:50%;transform:translateX(-50%);background:rgba(255,215,0,.93);color:#222;font-weight:700;font-size:14px;padding:7px 18px;border-radius:20px;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;z-index:5}
#toast.show{opacity:1}
#plist{position:absolute;bottom:14px;left:0;right:0;display:flex;justify-content:center;gap:7px;flex-wrap:wrap;padding:0 10px;pointer-events:none}
.ci{width:34px;height:34px;background:rgba(0,0,0,.5);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid rgba(255,215,0,.6);animation:popIn .3s ease-out}
@keyframes popIn{0%{transform:scale(0)}80%{transform:scale(1.2)}100%{transform:scale(1)}}
#startS{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.85);color:#fff;text-align:center;padding:24px;z-index:10}
#startS h1{font-size:26px;font-weight:700;color:#FFD700;margin-bottom:8px}
#startS p{font-size:13px;color:rgba(255,255,255,.7);margin-bottom:22px;max-width:280px;line-height:1.6}
#startBtn{background:#e63946;color:#fff;border:none;border-radius:30px;font-size:17px;font-weight:700;padding:13px 34px;cursor:pointer}
#camErr{color:#ff6b6b;font-size:12px;margin-top:10px;display:none}
#gameOver{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.88);color:#fff;text-align:center;z-index:10;padding:24px}
#gameOver h2{font-size:28px;font-weight:700;color:#FFD700;margin-bottom:10px}
.fscore{font-size:52px;font-weight:700;margin:10px 0}
#gameOver p{color:rgba(255,255,255,.7);margin-bottom:22px}
#replayBtn{background:#FFD700;color:#222;border:none;border-radius:30px;font-size:16px;font-weight:700;padding:13px 34px;cursor:pointer}
.ripple{position:absolute;transform:translate(-50%,-50%);pointer-events:none;animation:rip .6s ease-out forwards;border:3px solid #FFD700;border-radius:50%}
@keyframes rip{0%{width:20px;height:20px;opacity:1}100%{width:110px;height:110px;opacity:0}}
.pball{position:absolute;pointer-events:none;width:26px;height:26px;animation:pthrow .5s ease-in forwards}
@keyframes pthrow{0%{opacity:1;transform:translate(0,0) scale(1) rotate(0deg)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.3) rotate(720deg)}}
#nameTag{position:absolute;pointer-events:none;color:#fff;font-size:12px;font-weight:700;background:rgba(0,0,0,.6);padding:3px 8px;border-radius:10px;transform:translateX(-50%);white-space:nowrap;opacity:0;transition:opacity .2s}
</style>

<div id="gc">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="threeCanvas"></canvas>
  <div id="hitLayer"></div>
  <div id="hud">
    <div class="hval" id="scoreH">⭐ 0</div>
    <div class="hval" id="timerH">60s</div>
    <div class="hval" id="ballH">🔴 10</div>
  </div>
  <div id="toast"></div>
  <div id="plist"></div>
  <div id="nameTag"></div>

  <div id="startS">
    <div style="font-size:64px;margin-bottom:6px">🎮</div>
    <h1>Pokémon AR 3D</h1>
    <p>Pokémon 3D low-poly sẽ xuất hiện trên camera thật. Chạm vào để bắt!</p>
    <button id="startBtn" onclick="startGame()">Bắt đầu chơi</button>
    <div id="camErr">⚠️ Không thể mở camera — hãy cấp quyền và thử lại.</div>
  </div>
  <div id="gameOver">
    <div style="font-size:60px">🏆</div>
    <h2>Hết giờ!</h2>
    <div class="fscore" id="fscore">0</div>
    <p id="fmsg">Pokémon đã bắt</p>
    <button id="replayBtn" onclick="resetGame()">Chơi lại</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const gc=document.getElementById('gc');
const video=document.getElementById('video');
const threeCanvas=document.getElementById('threeCanvas');
const hitLayer=document.getElementById('hitLayer');
const nameTag=document.getElementById('nameTag');

let scene,camera,renderer,animId;
let pokemons3d=[];
let score=0,timeLeft=60,pokeballs=10,gameRunning=false;
let spawnInt,timerInt,caught=[];
let W,H;

function initThree(){
  W=gc.offsetWidth; H=gc.offsetHeight;
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(60,W/H,0.1,1000);
  camera.position.z=5;
  renderer=new THREE.WebGLRenderer({canvas:threeCanvas,alpha:true,antialias:true});
  renderer.setSize(W,H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setClearColor(0x000000,0);
  const amb=new THREE.AmbientLight(0xffffff,0.7);
  scene.add(amb);
  const dir=new THREE.DirectionalLight(0xffffff,0.9);
  dir.position.set(3,5,3);
  scene.add(dir);
  animate();
}

function animate(){
  animId=requestAnimationFrame(animate);
  const t=Date.now()*0.001;
  pokemons3d.forEach(p=>{
    if(!p.mesh)return;
    p.mesh.rotation.y+=0.025;
    p.mesh.position.y=p.baseY+Math.sin(t*1.8+p.phase)*0.12;
  });
  renderer.render(scene,camera);
}

const PDEFS=[
  {name:'Pikachu',emoji:'⚡',pts:10,color:0xFFD700,accent:0xFF8C00,build:'pikachu'},
  {name:'Bulbasaur',emoji:'🌿',pts:15,color:0x78C850,accent:0x4CAF50,build:'bulbasaur'},
  {name:'Charmander',emoji:'🔥',pts:15,color:0xF08030,accent:0xFF4500,build:'charmander'},
  {name:'Squirtle',emoji:'💧',pts:15,color:0x6890F0,accent:0x3366CC,build:'squirtle'},
  {name:'Gengar',emoji:'👻',pts:25,color:0x705898,accent:0xFF0000,build:'gengar'},
  {name:'Mewtwo',emoji:'🧬',pts:50,color:0xC070C0,accent:0x7030A0,build:'mewtwo'},
];

function buildMesh(def){
  const g=new THREE.Group();
  const M=THREE.MeshToonMaterial||THREE.MeshLambertMaterial;
  const mat=c=>new M({color:c});

  if(def.build==='pikachu'){
    const body=new THREE.Mesh(new THREE.SphereGeometry(.32,8,8),mat(def.color));
    g.add(body);
    const head=new THREE.Mesh(new THREE.SphereGeometry(.28,8,8),mat(def.color));
    head.position.set(0,.45,0);g.add(head);
    const cheekL=new THREE.Mesh(new THREE.SphereGeometry(.09,6,6),mat(0xFF6699));
    cheekL.position.set(-.18,.38,.2);g.add(cheekL);
    const cheekR=cheekL.clone();cheekR.position.x=.18;g.add(cheekR);
    const eyeL=new THREE.Mesh(new THREE.SphereGeometry(.055,6,6),mat(0x111111));
    eyeL.position.set(-.1,.52,.24);g.add(eyeL);
    const eyeR=eyeL.clone();eyeR.position.x=.1;g.add(eyeR);
    const earL=new THREE.Mesh(new THREE.ConeGeometry(.07,.28,4),mat(0x222222));
    earL.position.set(-.15,.78,0);earL.rotation.z=-.3;g.add(earL);
    const earR=earL.clone();earR.position.x=.15;earR.rotation.z=.3;g.add(earR);
    const tail=new THREE.Mesh(new THREE.ConeGeometry(.06,.35,4),mat(def.color));
    tail.position.set(.35,-.1,-.1);tail.rotation.z=.8;g.add(tail);
  } else if(def.build==='bulbasaur'){
    const body=new THREE.Mesh(new THREE.SphereGeometry(.35,8,8),mat(def.color));
    body.scale.y=.8;g.add(body);
    const head=new THREE.Mesh(new THREE.SphereGeometry(.27,8,8),mat(def.color));
    head.position.set(0,.4,0);g.add(head);
    const bulb=new THREE.Mesh(new THREE.SphereGeometry(.2,7,7),mat(def.accent));
    bulb.position.set(0,.3,-.2);g.add(bulb);
    const eyeL=new THREE.Mesh(new THREE.SphereGeometry(.055,6,6),mat(0xCC4444));
    eyeL.position.set(-.1,.46,.22);g.add(eyeL);
    const eyeR=eyeL.clone();eyeR.position.x=.1;g.add(eyeR);
    const spotL=new THREE.Mesh(new THREE.CircleGeometry(.06,6),mat(0x4a7c4a));
    spotL.position.set(-.2,.05,.34);g.add(spotL);
    const spotR=spotL.clone();spotR.position.x=.2;g.add(spotR);
  } else if(def.build==='charmander'){
    const body=new THREE.Mesh(new THREE.CylinderGeometry(.22,.28,.5,8),mat(def.color));
    body.position.y=-.1;g.add(body);
    const head=new THREE.Mesh(new THREE.SphereGeometry(.27,8,8),mat(def.color));
    head.position.set(0,.42,0);g.add(head);
    const belly=new THREE.Mesh(new THREE.SphereGeometry(.18,7,7),mat(0xFFDB99));
    belly.position.set(0,.05,.2);belly.scale.z=.5;g.add(belly);
    const eyeL=new THREE.Mesh(new THREE.SphereGeometry(.055,6,6),mat(0x111111));
    eyeL.position.set(-.1,.5,.23);g.add(eyeL);
    const eyeR=eyeL.clone();eyeR.position.x=.1;g.add(eyeR);
    const flame=new THREE.Mesh(new THREE.ConeGeometry(.08,.22,6),mat(0xFF4500));
    flame.position.set(.3,-.15,-.1);flame.rotation.z=-.6;g.add(flame);
    const flame2=new THREE.Mesh(new THREE.ConeGeometry(.05,.14,6),mat(0xFFD700));
    flame2.position.set(.3,-.05,-.1);flame2.rotation.z=-.6;g.add(flame2);
  } else if(def.build==='squirtle'){
    const shell=new THREE.Mesh(new THREE.SphereGeometry(.35,8,8),mat(0x7038F8));
    shell.scale.set(1,.75,1);g.add(shell);
    const body=new THREE.Mesh(new THREE.SphereGeometry(.28,8,8),mat(def.color));
    g.add(body);
    const belly=new THREE.Mesh(new THREE.SphereGeometry(.22,7,7),mat(0xB8D4F8));
    belly.position.set(0,0,.18);belly.scale.z=.5;g.add(belly);
    const head=new THREE.Mesh(new THREE.SphereGeometry(.26,8,8),mat(def.color));
    head.position.set(0,.38,0);g.add(head);
    const eyeL=new THREE.Mesh(new THREE.SphereGeometry(.06,6,6),mat(0x4488FF));
    eyeL.position.set(-.1,.44,.2);g.add(eyeL);
    const eyeR=eyeL.clone();eyeR.position.x=.1;g.add(eyeR);
    const tail=new THREE.Mesh(new THREE.TorusGeometry(.12,.04,6,8,Math.PI),mat(def.color));
    tail.position.set(0,-.1,-.28);tail.rotation.x=.5;g.add(tail);
  } else if(def.build==='gengar'){
    const body=new THREE.Mesh(new THREE.SphereGeometry(.35,8,8),mat(def.color));
    g.add(body);
    const head=new THREE.Mesh(new THREE.SphereGeometry(.3,8,8),mat(def.color));
    head.position.set(0,.42,0);g.add(head);
    const eyeL=new THREE.Mesh(new THREE.SphereGeometry(.08,6,6),mat(def.accent));
    eyeL.position.set(-.11,.5,.22);g.add(eyeL);
    const eyeR=eyeL.clone();eyeR.position.x=.11;g.add(eyeR);
    const pupL=new THREE.Mesh(new THREE.SphereGeometry(.04,5,5),mat(0x111111));
    pupL.position.set(-.11,.5,.28);g.add(pupL);
    const pupR=pupL.clone();pupR.position.x=.11;g.add(pupR);
    const earL=new THREE.Mesh(new THREE.ConeGeometry(.1,.2,4),mat(def.color));
    earL.position.set(-.2,.72,0);earL.rotation.z=-.25;g.add(earL);
    const earR=earL.clone();earR.position.x=.2;earR.rotation.z=.25;g.add(earR);
    [-0.12,0,0.12].forEach(x=>{
      const t=new THREE.Mesh(new THREE.ConeGeometry(.05,.12,4),mat(0xffffff));
      t.position.set(x,.28,.3);t.rotation.x=-.4;g.add(t);
    });
  } else {
    const body=new THREE.Mesh(new THREE.CylinderGeometry(.18,.22,.5,8),mat(def.color));
    body.position.y=-.08;g.add(body);
    const head=new THREE.Mesh(new THREE.SphereGeometry(.26,8,8),mat(0xC8A8E0));
    head.position.set(0,.42,0);g.add(head);
    const eyeL=new THREE.Mesh(new THREE.SphereGeometry(.065,6,6),mat(0x7030A0));
    eyeL.position.set(-.1,.48,.2);g.add(eyeL);
    const eyeR=eyeL.clone();eyeR.position.x=.1;g.add(eyeR);
    const earL=new THREE.Mesh(new THREE.ConeGeometry(.06,.22,5),mat(def.color));
    earL.position.set(-.15,.72,0);earL.rotation.z=-.2;g.add(earL);
    const earR=earL.clone();earR.position.x=.15;earR.rotation.z=.2;g.add(earR);
    const tailG=new THREE.Mesh(new THREE.CylinderGeometry(.03,.05,.4,6),mat(def.color));
    tailG.position.set(.28,-.15,-.15);tailG.rotation.z=.7;g.add(tailG);
    const auraL=new THREE.Mesh(new THREE.SphereGeometry(.08,6,6),mat(0x9040B0));
    auraL.position.set(-.28,.1,.1);g.add(auraL);
    const auraR=auraL.clone();auraR.position.x=.28;g.add(auraR);
  }
  return g;
}

function worldToScreen(mesh){
  const pos=new THREE.Vector3();
  mesh.getWorldPosition(pos);
  pos.project(camera);
  return{
    x:(pos.x*.5+.5)*W,
    y:(-.5*pos.y+.5)*H,
    visible:pos.z<1
  };
}

function spawnPokemon(){
  if(!gameRunning||pokemons3d.length>=4)return;
  const def=PDEFS[Math.floor(Math.random()*PDEFS.length)];
  const mesh=buildMesh(def);
  const x=(Math.random()-.5)*4.5;
  const y=(Math.random()-.5)*2.2+.3;
  const z=(Math.random()-.5)*.8-1.5;
  mesh.position.set(x,y,z);
  const baseY=y;
  const phase=Math.random()*Math.PI*2;
  scene.add(mesh);
  const entry={mesh,def,baseY,phase,alive:true,id:Date.now()+Math.random()};
  pokemons3d.push(entry);
  setTimeout(()=>{
    if(entry.alive)removePokemon(entry);
  },8000);
}

function removePokemon(entry){
  if(!entry.alive)return;
  entry.alive=false;
  scene.remove(entry.mesh);
  pokemons3d=pokemons3d.filter(p=>p!==entry);
}

function setupHitDetection(){
  hitLayer.addEventListener('click',onTap);
  hitLayer.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];onTap({clientX:t.clientX,clientY:t.clientY});},{passive:false});
}

function onTap(e){
  if(!gameRunning)return;
  const rect=gc.getBoundingClientRect();
  const cx=e.clientX-rect.left;
  const cy=e.clientY-rect.top;
  let hit=null,minDist=55;
  pokemons3d.forEach(p=>{
    if(!p.alive)return;
    const s=worldToScreen(p.mesh);
    if(!s.visible)return;
    const d=Math.hypot(cx-s.x,cy-s.y);
    if(d<minDist){minDist=d;hit=p;}
  });
  if(hit)catchPokemon(hit,cx,cy);
}

function catchPokemon(entry,cx,cy){
  if(pokeballs<=0){showToast('Hết Pokéball! 😱');return;}
  pokeballs--;
  throwBall(cx,cy);
  addRipple(cx,cy);
  score+=entry.def.pts;
  caught.push(entry.def);
  updateHUD();
  showToast(entry.def.emoji+' '+entry.def.name+' +'+entry.def.pts+'pts!');
  addCaughtIcon(entry.def.emoji);
  shrinkOut(entry);
  removePokemon(entry);
  if(pokeballs<=0)setTimeout(endGame,500);
}

function shrinkOut(entry){
  let s=1;
  const iv=setInterval(()=>{
    s-=0.15;
    if(s<=0){clearInterval(iv);return;}
    if(entry.mesh)entry.mesh.scale.setScalar(s);
  },30);
}

function throwBall(tx,ty){
  const b=document.createElement('div');
  b.className='pball';
  const sx=W/2,sy=H-40;
  b.style.left=sx+'px';b.style.top=sy+'px';
  b.style.setProperty('--tx',(tx-sx)+'px');
  b.style.setProperty('--ty',(ty-sy)+'px');
  b.innerHTML=`<svg width="26" height="26" viewBox="0 0 26 26"><circle cx="13" cy="13" r="12" fill="#fff" stroke="#333" stroke-width="1"/><path d="M1 13 Q13 13 25 13" stroke="#333" stroke-width="1"/><path d="M1 13 A12 12 0 0 1 25 13" fill="#e44"/><circle cx="13" cy="13" r="4.5" fill="#fff" stroke="#333" stroke-width="1"/></svg>`;
  gc.appendChild(b);
  setTimeout(()=>b.remove(),520);
}

function addRipple(x,y){
  const r=document.createElement('div');
  r.className='ripple';r.style.left=x+'px';r.style.top=y+'px';
  gc.appendChild(r);setTimeout(()=>r.remove(),650);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1900);
}

function addCaughtIcon(emoji){
  const l=document.getElementById('plist');
  const i=document.createElement('div');i.className='ci';i.textContent=emoji;
  l.appendChild(i);
  if(l.children.length>8)l.removeChild(l.firstChild);
}

function updateHUD(){
  document.getElementById('scoreH').textContent='⭐ '+score;
  document.getElementById('timerH').textContent=timeLeft+'s';
  document.getElementById('ballH').textContent='🔴 '+pokeballs;
  if(timeLeft<=10)document.getElementById('timerH').style.background='rgba(220,30,30,.9)';
}

function tick(){
  if(!gameRunning)return;
  timeLeft--;updateHUD();
  if(timeLeft<=0)endGame();
}

function endGame(){
  if(!gameRunning)return;
  gameRunning=false;
  clearInterval(spawnInt);clearInterval(timerInt);
  pokemons3d.slice().forEach(p=>removePokemon(p));
  document.getElementById('fscore').textContent=score;
  document.getElementById('fmsg').textContent='Bắt được '+caught.length+' Pokémon';
  document.getElementById('gameOver').style.display='flex';
}

function resetGame(){
  document.getElementById('gameOver').style.display='none';
  document.getElementById('plist').innerHTML='';
  score=0;timeLeft=60;pokeballs=10;caught=[];
  gameRunning=true;updateHUD();
  document.getElementById('timerH').style.background='rgba(200,40,40,.75)';
  spawnInt=setInterval(spawnPokemon,2200);
  timerInt=setInterval(tick,1000);
  setTimeout(spawnPokemon,400);setTimeout(spawnPokemon,1300);
}

async function startGame(){
  const err=document.getElementById('camErr');
  try{
    const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280}},audio:false});
    video.srcObject=s;await video.play();
  }catch(e){
    try{
      const s2=await navigator.mediaDevices.getUserMedia({video:true,audio:false});
      video.srcObject=s2;await video.play();
    }catch(e2){err.style.display='block';return;}
  }
  document.getElementById('startS').style.display='none';
  W=gc.offsetWidth;H=gc.offsetHeight;
  if(!renderer)initThree();
  else{renderer.setSize(W,H);camera.aspect=W/H;camera.updateProjectionMatrix();}
  setupHitDetection();
  gameRunning=true;score=0;timeLeft=60;pokeballs=10;caught=[];
  updateHUD();
  spawnInt=setInterval(spawnPokemon,2200);
  timerInt=setInterval(tick,1000);
  setTimeout(spawnPokemon,300);setTimeout(spawnPokemon,1100);
}

window.startGame=startGame;
window.resetGame=resetGame;
window.addEventListener('resize',()=>{
  if(!renderer)return;
  W=gc.offsetWidth;H=gc.offsetHeight;
  renderer.setSize(W,H);camera.aspect=W/H;camera.updateProjectionMatrix();
});
</script>
