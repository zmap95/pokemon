
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #000; }
#game-container {
  position: relative;
  width: 100%;
  height: 100svh;
  min-height: 500px;
  overflow: hidden;
  background: #111;
  font-family: var(--font-sans, sans-serif);
}
#video { width: 100%; height: 100%; object-fit: cover; display: block; }
#canvas-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
}
#ui-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
}
.pokemon-sprite {
  position: absolute;
  cursor: pointer;
  pointer-events: all;
  transform: translate(-50%, -50%);
  transition: transform 0.1s;
  user-select: none;
  animation: float 2.5s ease-in-out infinite;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
}
.pokemon-sprite:active { transform: translate(-50%, -50%) scale(0.85); }
.pokemon-sprite svg { display: block; }
@keyframes float {
  0%,100% { transform: translate(-50%, -60%); }
  50% { transform: translate(-50%, -40%); }
}
.pokemon-sprite.catching {
  animation: catch-anim 0.6s forwards;
}
@keyframes catch-anim {
  0% { transform: translate(-50%,-50%) scale(1); opacity:1; }
  40% { transform: translate(-50%,-50%) scale(1.3); opacity:0.8; }
  100% { transform: translate(-50%,-50%) scale(0); opacity:0; }
}
#hud-top {
  position: absolute; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);
  pointer-events: none;
}
#score-display {
  color: #fff; font-size: 16px; font-weight: 500;
  background: rgba(0,0,0,0.4); border-radius: 20px; padding: 6px 14px;
  border: 1.5px solid rgba(255,255,255,0.25);
}
#timer-display {
  color: #fff; font-size: 16px; font-weight: 500;
  background: rgba(220,50,50,0.7); border-radius: 20px; padding: 6px 14px;
}
#pokeball-count {
  color: #fff; font-size: 14px;
  background: rgba(0,0,0,0.4); border-radius: 20px; padding: 6px 12px;
  border: 1.5px solid rgba(255,255,255,0.25);
}
#start-screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.82);
  color: #fff; text-align: center; padding: 24px;
  z-index: 10;
}
#start-screen h1 { font-size: 28px; font-weight: 700; color: #FFD700; margin-bottom: 8px; text-shadow: 0 0 20px #FFD70088; }
#start-screen p { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 24px; max-width: 280px; }
#start-btn {
  background: #e63946; color: #fff; border: none; border-radius: 30px;
  font-size: 18px; font-weight: 600; padding: 14px 36px; cursor: pointer;
  box-shadow: 0 4px 20px rgba(230,57,70,0.5);
  transition: transform 0.15s, box-shadow 0.15s;
}
#start-btn:hover { transform: scale(1.05); box-shadow: 0 6px 28px rgba(230,57,70,0.7); }
#cam-error { color: #ff6b6b; font-size: 13px; margin-top: 12px; display: none; }
.catch-effect {
  position: absolute; transform: translate(-50%,-50%);
  pointer-events: none; animation: ripple 0.6s ease-out forwards;
}
@keyframes ripple {
  0% { width: 20px; height: 20px; opacity: 1; border: 3px solid #FFD700; border-radius: 50%; }
  100% { width: 120px; height: 120px; opacity: 0; border: 3px solid #FFD700; border-radius: 50%; }
}
#toast {
  position: absolute; top: 70px; left: 50%; transform: translateX(-50%);
  background: rgba(255,215,0,0.92); color: #222; font-weight: 600; font-size: 15px;
  padding: 8px 20px; border-radius: 20px; pointer-events: none;
  opacity: 0; transition: opacity 0.3s;
  white-space: nowrap; z-index: 5;
}
#toast.show { opacity: 1; }
#game-over {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.88); color: #fff; text-align: center;
  z-index: 10; display: none; padding: 24px;
}
#game-over h2 { font-size: 30px; font-weight: 700; color: #FFD700; margin-bottom: 12px; }
#game-over .final-score { font-size: 48px; font-weight: 700; margin: 12px 0; }
#game-over p { color: rgba(255,255,255,0.7); margin-bottom: 24px; }
#replay-btn {
  background: #FFD700; color: #222; border: none; border-radius: 30px;
  font-size: 17px; font-weight: 700; padding: 14px 36px; cursor: pointer;
}
#poke-list {
  position: absolute; bottom: 16px; left: 0; right: 0;
  display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; padding: 0 12px;
  pointer-events: none;
}
.caught-icon {
  width: 36px; height: 36px; background: rgba(0,0,0,0.5);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 20px; border: 2px solid rgba(255,215,0,0.6);
  animation: popIn 0.3s ease-out;
}
@keyframes popIn {
  0% { transform: scale(0); } 80% { transform: scale(1.2); } 100% { transform: scale(1); }
}
.pokeball-throw {
  position: absolute; pointer-events: none;
  width: 28px; height: 28px;
  animation: throwBall 0.5s ease-in forwards;
}
@keyframes throwBall {
  0% { opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); }
  100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.3) rotate(720deg); }
}
</style>

<div id="game-container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas-overlay"></canvas>
  <div id="ui-overlay">
    <div id="hud-top">
      <div id="score-display">⭐ 0</div>
      <div id="timer-display">60s</div>
      <div id="pokeball-count">🔴 10</div>
    </div>
    <div id="toast"></div>

  <div id="start-screen">
    <div style="font-size:72px;margin-bottom:8px">🎮</div>
    <h1>Pokémon AR Catcher</h1>
    <p>Nhấn bắt đầu để mở camera. Các Pokémon sẽ xuất hiện trên màn hình — chạm vào để bắt!</p>

  </div>
</div>

    <circle cx="47" cy="32" r="3" fill="#7030A0"/>

let score = 0, timeLeft = 60, pokeballs = 10, gameRunning = false;
let spawnInterval, timerInterval;
let caughtPokemon = [];
const container = document.getElementById('game-container');
const video = document.getElementById('video');
const startScreen = document.getElementById('start-screen');
const gameOverScreen = document.getElementById('game-over');

async function startGame() {
  const errorEl = document.getElementById('cam-error');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
  } catch (e) {
    try {
      const stream2 = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      video.srcObject = stream2;
      await video.play();
    } catch (e2) {
      errorEl.style.display = 'block';
      errorEl.textContent = '⚠️ Không thể mở camera. Hãy cho phép truy cập camera và thử lại.';
      return;
    }
  }
  startScreen.style.display = 'none';
  gameRunning = true;
  score = 0; timeLeft = 60; pokeballs = 10; caughtPokemon = [];
  updateHUD();
  spawnInterval = setInterval(spawnPokemon, 2200);
  timerInterval = setInterval(tick, 1000);
  setTimeout(spawnPokemon, 400);
  setTimeout(spawnPokemon, 1200);
}

function tick() {
  if (!gameRunning) return;
  timeLeft--;
  updateHUD();
  if (timeLeft <= 0) endGame();
}

function updateHUD() {
  document.getElementById('score-display').textContent = '⭐ ' + score;
  document.getElementById('timer-display').textContent = timeLeft + 's';
  document.getElementById('pokeball-count').textContent = '🔴 ' + pokeballs;
  if (timeLeft <= 10) document.getElementById('timer-display').style.background = 'rgba(220,30,30,0.9)';
}

function spawnPokemon() {
  if (!gameRunning) return;
  const existing = container.querySelectorAll('.pokemon-sprite');
  if (existing.length >= 4) return;
  const pkm = POKEMON[Math.floor(Math.random() * POKEMON.length)];
  const margin = 80;
  const x = margin + Math.random() * (container.offsetWidth - margin * 2);
  const y = 100 + Math.random() * (container.offsetHeight - 220);
  const el = document.createElement('div');
  el.className = 'pokemon-sprite';
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.innerHTML = pkm.svg;
  el.dataset.name = pkm.name;
  el.dataset.emoji = pkm.emoji;
  el.dataset.points = pkm.points;
  el.style.animationDelay = (Math.random() * 1.5) + 's';
  el.addEventListener('click', () => catchPokemon(el, x, y));
  container.appendChild(el);
  setTimeout(() => { if (el.parentNode) el.remove(); }, 7000);
}

function catchPokemon(el, x, y) {
  if (!gameRunning || el.classList.contains('catching')) return;
  if (pokeballs <= 0) { showToast('Hết Pokéball! 😱'); return; }
  pokeballs--;
  throwPokeball(x, y);
  el.classList.add('catching');
  const pts = parseInt(el.dataset.points);
  const name = el.dataset.name;
  const emoji = el.dataset.emoji;
  score += pts;
  caughtPokemon.push({ name, emoji, points: pts });
  updateHUD();
  addRipple(x, y);
  showToast(emoji + ' ' + name + ' +' + pts + 'pts!');
  addCaughtIcon(emoji);
  setTimeout(() => { if (el.parentNode) el.remove(); }, 600);
  if (pokeballs <= 0) setTimeout(endGame, 500);
}

function throwPokeball(tx, ty) {
  const ball = document.createElement('div');
  ball.className = 'pokeball-throw';
  ball.innerHTML = `<svg width="28" height="28" viewBox="0 0 28 28"><circle cx="14" cy="14" r="13" fill="#fff" stroke="#333" stroke-width="1"/><path d="M1 14 Q14 14 27 14" stroke="#333" stroke-width="1.5"/><path d="M1 14 A13 13 0 0 1 27 14" fill="#e44" stroke="none"/><circle cx="14" cy="14" r="5" fill="#fff" stroke="#333" stroke-width="1"/><circle cx="14" cy="14" r="2.5" fill="#fff"/></svg>`;
  const startX = container.offsetWidth / 2;
  const startY = container.offsetHeight - 40;
  ball.style.left = startX + 'px';
  ball.style.top = startY + 'px';
  const dx = tx - startX, dy = ty - startY;
  ball.style.setProperty('--tx', dx + 'px');
  ball.style.setProperty('--ty', dy + 'px');
  container.appendChild(ball);
  setTimeout(() => ball.remove(), 520);
}

function addRipple(x, y) {
  const r = document.createElement('div');
  r.className = 'catch-effect';
  r.style.left = x + 'px'; r.style.top = y + 'px';
  container.appendChild(r);
  setTimeout(() => r.remove(), 700);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function addCaughtIcon(emoji) {
  const list = document.getElementById('poke-list');
  const icon = document.createElement('div');
  icon.className = 'caught-icon';
  icon.textContent = emoji;
  list.appendChild(icon);
  if (list.children.length > 8) list.removeChild(list.firstChild);
}

function endGame() {
  if (!gameRunning) return;
  gameRunning = false;
  clearInterval(spawnInterval);
  clearInterval(timerInterval);
  container.querySelectorAll('.pokemon-sprite').forEach(el => el.remove());
  document.getElementById('final-score').textContent = score;
  document.getElementById('final-msg').textContent = 'Bắt được ' + caughtPokemon.length + ' Pokémon';
  gameOverScreen.style.display = 'flex';
}

function resetGame() {
  gameOverScreen.style.display = 'none';
  document.getElementById('poke-list').innerHTML = '';
  document.getElementById('toast').classList.remove('show');
  if (video.srcObject) { startGameAgain(); } else { startGame(); }
}

async function startGameAgain() {
  score = 0; timeLeft = 60; pokeballs = 10; caughtPokemon = [];
  gameRunning = true;
  updateHUD();
  document.getElementById('timer-display').style.background = 'rgba(220,50,50,0.7)';
  spawnInterval = setInterval(spawnPokemon, 2200);
  timerInterval = setInterval(tick, 1000);
  setTimeout(spawnPokemon, 400);
  setTimeout(spawnPokemon, 1200);
}
</script>
