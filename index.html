<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Pokemon Catcher</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/vconsole/dist/vconsole.min.js"></script>
    <script>
        // Bật vConsole để debug lỗi màn hình trắng
        var vConsole = new window.VConsole();
        console.log("Đã khởi động trang web!");
    </script>
    <style>
        #ui {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 20px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            display: none; /* Sẽ hiện khi vào AR */
            pointer-events: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="ui">Hãy chĩa camera xuống sàn để tìm vị trí!</div>

    <a-scene 
        webxr="optionalFeatures: hit-test, local-floor;" 
        ar-hit-test="target: #reticle;" 
        renderer="colorManagement: true;">
        
        <a-sky color="#ECECEC" hide-on-enter-ar></a-sky>

        <a-entity camera look-controls>
            <a-entity cursor="rayOrigin: mouse;" raycaster="objects: .pokemon"></a-entity>
        </a-entity>

        <a-entity id="reticle" geometry="primitive: ring; radiusInner: 0.15; radiusOuter: 0.2" 
                  material="color: #ff0000; shader: flat" 
                  rotation="-90 0 0" visible="false">
        </a-entity>

    </a-scene>

    <script>
        // Đảm bảo DOM đã load xong mới chạy code
        document.addEventListener('DOMContentLoaded', () => {
            const sceneEl = document.querySelector('a-scene');
            const reticle = document.querySelector('#reticle');
            const ui = document.querySelector('#ui');
            
            console.log("DOM loaded. Chờ A-Frame...");

            if (!sceneEl) {
                console.error("Không tìm thấy thẻ a-scene!");
                return;
            }

            const pokemonTypes = [
                { name: 'Pikachu', color: '#F4D03F', scale: '0.2 0.2 0.2' },
                { name: 'Bulbasaur', color: '#27AE60', scale: '0.25 0.2 0.25' },
                { name: 'Charmander', color: '#E67E22', scale: '0.2 0.25 0.2' }
            ];

            // Lắng nghe sự kiện khi AR Mode bắt đầu
            sceneEl.addEventListener('enter-vr', () => {
                console.log("Đã vào chế độ VR/AR");
                if (sceneEl.is('ar-mode')) {
                    ui.style.display = 'block';
                    console.log("Đã bật AR Mode thành công!");
                }
            });

            window.addEventListener('touchstart', (e) => {
                if (reticle && reticle.getAttribute('visible')) {
                    spawnPokemon(reticle.getAttribute('position'));
                }
            });

            function spawnPokemon(position) {
                const randomPoke = pokemonTypes[Math.floor(Math.random() * pokemonTypes.length)];
                const pokemonEl = document.createElement('a-entity');
                
                pokemonEl.setAttribute('geometry', 'primitive: box');
                pokemonEl.setAttribute('material', `color: ${randomPoke.color}`);
                pokemonEl.setAttribute('position', position);
                pokemonEl.setAttribute('scale', randomPoke.scale);
                pokemonEl.classList.add('pokemon');

                pokemonEl.setAttribute('animation', `property: scale; from: 0 0 0; to: ${randomPoke.scale}; dur: 500; easing: easeOutElastic`);

                pokemonEl.addEventListener('click', function (evt) {
                    alert(`Tuyệt vời! Bạn đã bắt được ${randomPoke.name}! 🔴`);
                    pokemonEl.parentNode.removeChild(pokemonEl);
                    evt.stopPropagation();
                });

                sceneEl.appendChild(pokemonEl);
                ui.innerText = "Đã xuất hiện Pokemon! Chạm vào nó để bắt!";
                console.log("Đã spawn:", randomPoke.name);
            }

            if(reticle) {
                reticle.addEventListener('targetFound', () => {
                    ui.innerText = "Chạm vào màn hình để thả Pokemon ra đây!";
                });
                reticle.addEventListener('targetLost', () => {
                    ui.innerText = "Đang tìm mặt phẳng (Di chuyển điện thoại từ từ)...";
                });
            }
        });
    </script>
</body>
</html>
