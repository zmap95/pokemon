<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Pokemon Safari</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene 
        embedded 
        arjs="sourceType: camera; debugUIEnabled: false;" 
        vr-mode-ui="enabled: false">
        
        <a-assets>
             <a-asset-item id="pokemonModel" src="https://raw.githubusercontent.com/NyanHedgehog/pokemon-models/master/gen1/gengar.glb"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro">
            <a-entity 
                gltf-model="#pokemonModel" 
                scale="0.05 0.05 0.05" 
                position="0 0 0" 
                animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>

    </a-scene>

</body>
</html>
